<svg width="512" height="128" viewBox="0 0 512 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&amp;family=Oxanium:wght@500;600&amp;display=swap');
      .wordmark-main {
        font-family: 'Orbitron', 'Inter', 'Segoe UI', sans-serif;
        font-weight: 800;
        letter-spacing: 0.14em;
      }
      .wordmark-sub {
        font-family: 'Oxanium', 'JetBrains Mono', 'SFMono-Regular', monospace;
        font-weight: 500;
        letter-spacing: 0.12em;
      }
    </style>
    <linearGradient id="shieldStroke" x1="16" y1="16" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="160" y1="26" x2="390" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="150" height="128" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="26" fill="#030712"/>
  <rect x="8" y="8" width="112" height="112" rx="26" stroke="#1f2937"/>

  <g filter="url(#glow)">
    <path d="M64 24L98 37V64C98 85 84 103 64 110C44 103 30 85 30 64V37L64 24Z" fill="#04111f" stroke="url(#shieldStroke)" stroke-width="3"/>
    <path d="M44 58L64 90L84 58" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M37 48H91" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  </g>

  <text x="146" y="70" class="wordmark-main" fill="url(#wordmark)" font-size="56">VIBESEC</text>
  <text x="149" y="96" class="wordmark-sub" fill="#95a9c1" font-size="15">AUTONOMOUS APP SECURITY</text>
</svg>
